<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalGuide — Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc; /* Slate 50 */
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .container {
      width: 100%;
      max-width: 800px;
    }
    
    /* Header Section */
    .header {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .input-group {
      margin-bottom: 24px;
    }
    .input-group:last-child {
      margin-bottom: 0;
    }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .title-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #334155;
      color: #f8fafc;
      font-size: 28px;
      font-weight: 600;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .title-input:focus {
      border-color: #3b82f6;
    }
    .desc-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid #334155;
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 15px;
      padding: 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .desc-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    /* Steps Section */
    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 48px;
    }
    .step-card {
      display: flex;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .step-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
      border-color: #475569;
    }
    .drag-handle {
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.3);
      border-right: 1px solid #334155;
      cursor: grab;
      color: #64748b;
      transition: color 0.2s;
    }
    .drag-handle:hover {
      color: #f8fafc;
    }
    .drag-handle svg {
      width: 20px;
      height: 20px;
    }
    .step-content {
      display: flex;
      flex: 1;
      padding: 20px;
      gap: 24px;
    }
    .step-image {
      width: 240px;
      height: 150px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
      object-fit: cover;
      flex-shrink: 0;
    }
    .step-details {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #3b82f6;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      height: 24px;
      width: 24px;
      border-radius: 12px;
    }
    .delete-btn {
      background: transparent;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    .step-desc-input {
      flex: 1;
      background: transparent;
      border: 1px solid transparent;
      color: #f8fafc;
      font-size: 15px;
      resize: none;
      padding: 8px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .step-desc-input:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .step-desc-input:focus {
      background: rgba(15, 23, 42, 0.5);
      border-color: #3b82f6;
    }

    /* Actions */
    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      bottom: 24px;
      z-index: 10;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
    }
    .save-status {
      font-size: 14px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .save-status.saved {
      color: #10b981; /* Emerald 500 */
    }
    .actions-right {
      display: flex;
      gap: 16px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }
    #loading {
      color: #9ca3af;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div id="loading">Loading guide…</div>

  <div class="container" id="app" style="display:none">
    
    <div class="header">
      <div class="input-group">
        <label class="label">Guide Title</label>
        <input type="text" class="title-input" id="guideTitleInput" placeholder="Enter guide title...">
      </div>
      <div class="input-group">
        <label class="label">Description (Optional)</label>
        <textarea class="desc-input" id="guideDescInput" placeholder="Briefly explain what this guide covers..."></textarea>
      </div>
    </div>

    <div class="steps-container" id="stepsContainer">
      <!-- Steps will be injected here by JS -->
    </div>

    <div class="actions-bar">
      <div class="save-status" id="saveStatus">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        All changes saved
      </div>
      <div class="actions-right">
        <button class="btn btn-primary" id="exportBtn">Export HTML</button>
      </div>
    </div>

  </div>

  <script src="editor.js" type="module"></script>
</body>
</html>
