<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LocalGuide — Recording</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f9fafb;
      color: #111827;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .recording-dot {
      width: 10px; height: 10px; border-radius: 999px; background: #f59e0b;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    h1 { font-size: 14px; margin: 0; font-weight: 600; }
    .status { font-size: 12px; color: #6b7280; margin: 0 0 16px; }
    .step-list { list-style: none; padding: 0; margin: 0 0 16px; }
    .step {
      display: flex; gap: 8px; padding: 10px; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px;
      min-width: 0;
    }
    .step-number {
      font-size: 12px; font-weight: 600; color: #92400e;
      background: #fef3c7; border-radius: 999px; padding: 2px 8px;
      flex: 0 0 auto; align-self: flex-start;
    }
    .step-thumb {
      width: 100%; aspect-ratio: 16/10; object-fit: cover;
      border-radius: 4px; border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }
    .step-body { flex: 1 1 auto; min-width: 0; }
    .step-description {
      margin: 0 0 6px; font-size: 13px; word-break: break-word;
      overflow: hidden; text-overflow: ellipsis;
    }
    .empty-state {
      padding: 24px 16px; text-align: center; color: #6b7280;
      background: #ffffff; border: 1px dashed #d1d5db; border-radius: 8px;
    }
    .actions {
      position: sticky; bottom: 0; background: #f9fafb; padding-top: 12px;
    }
    button.complete {
      width: 100%; padding: 10px 12px; font: inherit; font-weight: 600;
      background: #f59e0b; color: #1f2937; border: none; border-radius: 8px;
      cursor: pointer;
    }
    button.complete:hover { background: #d97706; color: #ffffff; }
  </style>
</head>
<body>
  <header>
    <span class="recording-dot" aria-hidden="true"></span>
    <h1>Recording</h1>
  </header>
  <p class="status" id="statusText">Click anywhere on the page to capture a Step.</p>
  <ul class="step-list" id="stepList" aria-live="polite"></ul>
  <div class="empty-state" id="emptyState">No Steps captured yet.</div>
  <div class="actions">
    <button class="complete" id="completeBtn" type="button">Complete Capture</button>
  </div>
  <script src="src/description.js"></script>
  <script src="src/db.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
