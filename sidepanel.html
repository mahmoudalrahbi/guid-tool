<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalGuide — Recording</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #f9fafb;
      color: #111;
    }
    h2 { font-size: 14px; margin: 0 0 10px; }
    #steps { list-style: none; padding: 0; margin: 0 0 12px; }
    #steps li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    #steps li img { width: 60px; height: 38px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
    #steps li span { font-size: 12px; color: #374151; }
    #completeBtn {
      width: 100%;
      padding: 10px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #completeBtn:hover { background: #15803d; }
    #empty { color: #9ca3af; font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>Recording…</h2>
  <p id="empty">No steps captured yet. Click anything on the page.</p>
  <ul id="steps"></ul>
  <button id="completeBtn">Complete Capture</button>
  <script src="sidepanel.js"></script>
</body>
</html>
