<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalGuide</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    button.primary {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
    
    .history-section {
      margin-top: 24px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }
    .history-title {
      font-size: 13px;
      text-transform: uppercase;
      color: #6b7280;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .guide-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .guide-item:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    .guide-info {
      flex: 1;
      min-width: 0;
    }
    .guide-name {
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111827;
      margin-bottom: 4px;
    }
    .guide-meta {
      font-size: 11px;
      color: #6b7280;
    }
    .delete-btn {
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }
    .empty-state {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      padding: 16px 0;
      display: none;
    }
  </style>
</head>
<body>
  <h1>LocalGuide</h1>
  <button id="startBtn" class="primary">Start Recording</button>
  <div id="status"></div>
  
  <div class="history-section">
    <div class="history-title">Recent Guides</div>
    <div id="emptyState" class="empty-state">No guides recorded yet.</div>
    <div id="historyList" class="history-list">
      <!-- Guide items injected here -->
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
