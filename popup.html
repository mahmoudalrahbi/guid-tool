<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalGuide</title>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>LocalGuide</h1>
  <button id="startBtn">Start Recording</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
