<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>LocalGuide</h1>
    <p class="status" id="statusText">Ready to record.</p>
    <p class="step-count" id="stepCount"></p>
    <div class="actions">
      <button id="startBtn" class="btn primary">Start Recording</button>
      <button id="stopBtn" class="btn danger hidden">Stop Recording</button>
      <button id="galleryBtn" class="btn secondary">Open Gallery</button>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
