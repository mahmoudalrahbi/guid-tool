<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LocalGuide - Gallery</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <div class="header">
    <div class="logo">LocalGuide Vault</div>
    <div class="actions">
      <div class="export-group">
        <button id="exportPdfBtn" class="btn primary">Export PDF</button>
        <button id="exportHtmlBtn" class="btn secondary">Export HTML</button>
        <button id="exportWordBtn" class="btn secondary">Export Word</button>
      </div>
      <button id="clearBtn" class="btn danger">Clear Data</button>
    </div>
  </div>
  <div class="container">
    <div id="emptyState" class="empty-state">
      <h2>No steps recorded yet</h2>
      <p>Open the extension popup and click "Start Recording" to capture your workflow.</p>
    </div>
    <div id="stepsList" class="steps-list">
      <!-- Steps will be dynamically injected here -->
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="gallery.js"></script>
  <script src="export.js"></script>
</body>
</html>
