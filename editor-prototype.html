<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalGuide Editor Prototype</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc; /* Slate 50 */
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .container {
      width: 100%;
      max-width: 800px;
    }
    
    /* Header Section */
    .header {
      background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .input-group {
      margin-bottom: 24px;
    }
    .input-group:last-child {
      margin-bottom: 0;
    }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8; /* Slate 400 */
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .title-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #334155; /* Slate 700 */
      color: #f8fafc;
      font-size: 28px;
      font-weight: 600;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .title-input:focus {
      border-color: #3b82f6; /* Blue 500 */
    }
    .desc-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid #334155;
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 15px;
      padding: 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .desc-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    /* Steps Section */
    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 48px;
    }
    .step-card {
      display: flex;
      background: #1e293b; /* Slate 800 */
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .step-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
      border-color: #475569;
    }
    .drag-handle {
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.3);
      border-right: 1px solid #334155;
      cursor: grab;
      color: #64748b;
      transition: color 0.2s;
    }
    .drag-handle:hover {
      color: #f8fafc;
    }
    .drag-handle svg {
      width: 20px;
      height: 20px;
    }
    .step-content {
      display: flex;
      flex: 1;
      padding: 20px;
      gap: 24px;
    }
    .step-image {
      width: 240px;
      height: 150px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
      object-fit: cover;
      flex-shrink: 0;
    }
    .step-details {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #3b82f6;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      height: 24px;
      width: 24px;
      border-radius: 12px;
    }
    .delete-btn {
      background: transparent;
      border: none;
      color: #ef4444; /* Red 500 */
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    .step-desc-input {
      flex: 1;
      background: transparent;
      border: 1px solid transparent;
      color: #f8fafc;
      font-size: 15px;
      resize: none;
      padding: 8px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .step-desc-input:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .step-desc-input:focus {
      background: rgba(15, 23, 42, 0.5);
      border-color: #3b82f6;
    }

    /* Actions */
    .actions-bar {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      bottom: 24px;
      z-index: 10;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background: #334155;
      color: #f8fafc;
    }
    .btn-secondary:hover {
      background: #475569;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="header">
      <div class="input-group">
        <label class="label">Guide Title</label>
        <input type="text" class="title-input" value="How to create a pull request" placeholder="Enter guide title...">
      </div>
      <div class="input-group">
        <label class="label">Description (Optional)</label>
        <textarea class="desc-input" placeholder="Briefly explain what this guide covers...">A step-by-step guide to opening a new PR in GitHub after pushing your branch.</textarea>
      </div>
    </div>

    <div class="steps-container">
      
      <!-- Step 1 -->
      <div class="step-card">
        <div class="drag-handle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
        </div>
        <div class="step-content">
          <img class="step-image" src="https://images.unsplash.com/photo-1618401471353-b98afee0b2eb?q=80&w=200&h=150&fit=crop" alt="Screenshot 1">
          <div class="step-details">
            <div class="step-header">
              <span class="step-number">1</span>
              <button class="delete-btn" title="Delete step">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
              </button>
            </div>
            <textarea class="step-desc-input">Click on the "Pull requests" tab at the top of the repository.</textarea>
          </div>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="step-card">
        <div class="drag-handle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
        </div>
        <div class="step-content">
          <img class="step-image" src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=200&h=150&fit=crop" alt="Screenshot 2">
          <div class="step-details">
            <div class="step-header">
              <span class="step-number">2</span>
              <button class="delete-btn" title="Delete step">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
              </button>
            </div>
            <textarea class="step-desc-input">Click the green "New pull request" button.</textarea>
          </div>
        </div>
      </div>

    </div>

    <div class="actions-bar">
      <button class="btn btn-secondary">Preview</button>
      <button class="btn btn-primary">Export HTML</button>
    </div>

  </div>

  <script src="editor-prototype.js"></script>
</body>
</html>
